apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-ui
  labels: { app.kubernetes.io/name: aiops-ui }
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: { app.kubernetes.io/name: aiops-ui }
  template:
    metadata:
      labels: { app.kubernetes.io/name: aiops-ui }
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: ui
          image: "{{ required "image.repository required" .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.service.containerPort }} }
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 5 }
          livenessProbe:  { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 10 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: [ALL] }
