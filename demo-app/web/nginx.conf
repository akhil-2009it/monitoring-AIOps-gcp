user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Combined log format — what the AIOps platform's nginx parser expects.
  log_format combined_with_rt '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'rt=$request_time';
  access_log /var/log/nginx/access.log combined_with_rt;

  sendfile on; keepalive_timeout 65;

  resolver 169.254.20.10 valid=30s ipv6=off;

  server {
    listen 80;
    server_name _;

    # Static frontend
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the FastAPI service.
    # Strip the /api prefix before forwarding.
    location /api/ {
      set $demo_api_upstream "demo-api.default.svc.cluster.local:8000";
      proxy_pass http://$demo_api_upstream/;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID     $request_id;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # Health probe (returns 200 even if upstream is down — for the liveness probe)
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
  }
}
